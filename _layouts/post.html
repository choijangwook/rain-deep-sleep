---
layout: default
---

<article class="post container">

  <h1>{{ page.title }}</h1>

  {% if page.youtube_id %}
    <a href="https://www.youtube.com/watch?v={{ page.youtube_id }}" target="_blank" class="youtube-button">
      ▶ Play on YouTube
    </a>
  {% endif %}

  <!-- 🔥 오디오 (재생바 제거) -->
  <audio id="main-audio" autoplay loop>
    <source src="/assets/audio/rain.mp3" type="audio/mpeg">
  </audio>

  <!-- 🔥 카운트다운 -->
  <div id="timer-display" class="timer-display">No timer</div>

  <!-- 🔥 버튼 -->
  <div class="timer-container">
    <button data-time="30">30m</button>
    <button data-time="60">1h</button>
    <button data-time="120">2h</button>
    <button data-time="240">4h</button>
    <button data-time="480">8h</button>
    <button data-time="0">OFF</button>
  </div>

  <div class="content">
    {{ content }}
  </div>

</article>
