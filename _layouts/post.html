---
layout: default
---

<article>

<h1>{{ page.title }}</h1>

<div style="max-width:800px;margin:auto;">
<iframe
  width="100%"
  height="315"
  src="https://www.youtube.com/embed/{{ page.video }}?playsinline=1&rel=0"
  title="YouTube video"
  frameborder="0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
  allowfullscreen>
</iframe>
</div>

<br>

<div>{{ page.intro }}</div>

<hr>

<div>{{ page.desc }}</div>

</article>
