---
layout: default
---

<article class="post container">

  <h1 class="post-title">{{ page.title }}</h1>

  <!-- 🔥 유튜브 썸네일 (유튜브 이동) -->
  {% if page.youtube_id %}
    <a class="thumb-link"
       href="https://www.youtube.com/watch?v={{ page.youtube_id }}"
       target="_blank">

      <img class="yt-thumb"
        src="https://img.youtube.com/vi/{{ page.youtube_id }}/hqdefault.jpg"
        alt="thumbnail">

    </a>
  {% endif %}

  <!-- 🔥 타이머 -->
  <div id="timer-display" class="timer-display">-</div>

  <div class="timer-container">
    <button data-time="30">30m</button>
    <button data-time="60">1h</button>
    <button data-time="120">2h</button>
    <button data-time="240">4h</button>
    <button data-time="480">8h</button>
    <button data-time="0">OFF</button>
  </div>

  <!-- AD -->
  <div class="ad-slot">AdSense Mid</div>

  <!-- CONTENT -->
  <div class="content">
    {{ content }}
  </div>

</article>
