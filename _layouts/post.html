---
layout: default
---

<article>

<h1>{{ page.title }}</h1>

<!-- 🎬 영상 -->
<div class="youtube-box">
<iframe width="100%" height="315"
src="https://www.youtube.com/embed/{{ page.video }}"
frameborder="0"
allowfullscreen>
</iframe>
</div>

<!-- 🔥 위 설명 -->
<div class="video-intro">
{{ content | split: '---' | first }}
</div>

<hr>

<!-- 🔥 아래 설명 -->
<div class="video-desc">
{{ content | split: '---' | last }}
</div>

</article>
