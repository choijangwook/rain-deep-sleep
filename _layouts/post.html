---
layout: default
---

<article class="post container">

  <h1>{{ page.title }}</h1>

  <!-- 🔥 유튜브 썸네일 -->
  {% if page.youtube_id %}
    <a href="https://www.youtube.com/watch?v={{ page.youtube_id }}" target="_blank">
      <img class="yt-thumb"
        src="https://img.youtube.com/vi/{{ page.youtube_id }}/hqdefault.jpg"
        alt="youtube thumbnail">
    </a>
  {% endif %}

  <!-- 🔥 유튜브 버튼 -->
  {% if page.youtube_id %}
    <a class="youtube-button"
       href="https://www.youtube.com/watch?v={{ page.youtube_id }}"
       target="_blank">
      ▶ Play on YouTube
    </a>
  {% endif %}

  <!-- 🔥 애드센스 자리 (중요) -->
  <div class="ad-slot">
    <!-- Google AdSense code here -->
  </div>

  <!-- 🔥 콘텐츠 -->
  <div class="content">
    {{ content }}
  </div>

</article>
